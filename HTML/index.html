<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
</head>
<link rel="stylesheet" href="../CSS/index.css">
<body>

<div class="container">

    <h1>Đăng ký tài khoản</h1>
    <p class="subtitle">Đăng ký tài khoản để sử dụng dịch vụ</p>

    <div class="row">
        <div class="form-group">
            <label>Họ và tên đệm</label>
            <input type="text" placeholder="nhập họ và tên đệm">
        </div>
        
        <div class="form-group">
            <label>Tên</label>
            <input type="text" placeholder="nhập tên">
        </div>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="vd: huydz@gmail.com">
    </div>

    <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password">
    </div>

    <div class="form-group">
        <label>Xác nhận mật khẩu</label>
        <input type="password">
    </div>

    <div class="checkbox">
    <div><input type="checkbox" id="agree"></div>
    <div><label for="agree" >
        Bạn đồng ý với <a href="">chính sách và điều khoản</a>
    </label></div>
</div>

    <button class="btn">Đăng ký</button>

    <div class="login">
        Bạn đã có tài khoản?
        <a href="./logIn.html">Đăng nhập</a>
    </div>

</div>

</body>
</html>
