<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>

   

</head>
<body>
 <link rel="stylesheet" href="../CSS/logIn.css">
<div class="container">

    <h1>Đăng nhập</h1>
    <p class="subtitle">
        Đăng nhập tài khoản để sử dụng hệ thống quản lý.
    </p>

    <form>

        <label>Email</label>
        <input type="email" placeholder="Nhập email">

        <label>Mật khẩu</label>
        <input type="password" placeholder="Nhập mật khẩu">

        <div class="row">

            <div class="remember">
                <input type="checkbox" id="remember">
                <label for="remember">Nhớ tài khoản</label>
            </div>

            <div class="forgot">
                <a href="#">Quên mật khẩu?</a>
            </div>

        </div>

        <button class="btn">
            Đăng nhập
        </button>

        <div class="register">
            Bạn chưa có tài khoản?
            <a href="./index.html">Đăng ký</a>
        </div>

    </form>

</div>

</body>
</html>
